<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalka App Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-container" class="auth-box">
    <div class="auth-tabs">
        <button id="tab-login" class="active" onclick="switchAuthMode('login')">Вхід</button>
        <button id="tab-register" onclick="switchAuthMode('register')">Реєстрація</button>
    </div>

    <h2 id="auth-title">З поверненням!</h2>

    <div id="auth-form">
        <input type="text" id="username-input" placeholder="Твій нікнейм">

        <input type="text" id="phone-input" class="hidden" placeholder="+380XXXXXXXXX">

        <input type="password" id="password-input" placeholder="Пароль">

        <button id="auth-submit-btn" onclick="handleAuthSubmit()">Ввійти</button>
    </div>

    <p id="error-msg" class="hidden"></p>
</div>

<div id="calc-container" class="calc hidden">
    <div class="user-info">
        <div class="user-details">
            <span id="user-label"></span>
            <button class="logout-link" onclick="logout()">🚪 Вихід</button>
        </div>
        <button class="history-trigger" onclick="toggleHistory()">📜 Профіль</button>
    </div>

    <div id="status-badge" class="hidden">Аккаунт обмежено</div>

    <div class="display" id="display">0</div>

    <div class="buttons">
        <button class="eng" onclick="sendOp('sin')">sin</button>
        <button class="eng" onclick="sendOp('cos')">cos</button>
        <button class="eng" onclick="sendOp('tan')">tan</button>
        <button class="eng" onclick="sendOp('log')">log</button>
        <button class="special" onclick="clearCalc()">AC</button>

        <button class="eng" onclick="sendOp('sqrt')">√</button>
        <button class="eng" onclick="addNum('3.14159')">π</button>
        <button class="eng" onclick="addNum('2.71828')">e</button>
        <button class="eng" onclick="addNum('(')">(</button>
        <button class="op" onclick="addNum('/')">÷</button>

        <button class="num" onclick="addNum(7)">7</button>
        <button class="num" onclick="addNum(8)">8</button>
        <button class="num" onclick="addNum(9)">9</button>
        <button class="eng" onclick="addNum(')')">)</button>
        <button class="op" onclick="addNum('*')">×</button>

        <button class="num" onclick="addNum(4)">4</button>
        <button class="num" onclick="addNum(5)">5</button>
        <button class="num" onclick="addNum(6)">6</button>
        <button class="eng" onclick="sendOp('square')">x²</button>
        <button class="op" onclick="addNum('-')">−</button>

        <button class="num" onclick="addNum(1)">1</button>
        <button class="num" onclick="addNum(2)">2</button>
        <button class="num" onclick="addNum(3)">3</button>
        <button class="eng" onclick="addNum('^')">xʸ</button>
        <button class="op" onclick="addNum('+')">+</button>

        <button class="num zero" onclick="addNum(0)">0</button>
        <button class="num" onclick="addNum('.')">.</button>
        <button class="equals" onclick="calculate()">=</button>
    </div>
</div>

<div id="history-panel" class="history-panel">
    <div class="history-header">
        <h3>Мій профіль</h3>
        <button class="close-btn" onclick="toggleHistory()">×</button>
    </div>

    <div class="user-stats-top">
        <p>👤 Ім'я: <b id="stat-name">...</b></p>
        <p>📱 Тел: <b id="stat-phone">...</b></p>
        <p>📅 Реєстрація: <b id="stat-date">...</b></p>
        <p>📈 Операцій: <b id="stat-ops">0</b></p>
    </div>

    <div class="history-title">Історія обчислень</div>
    <div id="history-content" class="history-list scrollable">
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
