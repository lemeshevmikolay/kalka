services:

  kalka:
    image: lemeshev/kalka:latest
    ports:
      - "3000:3000"
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  updater:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup --label-enable
    restart: always